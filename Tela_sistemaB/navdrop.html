<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar com foto e dropdown</title>
    <link rel="stylesheet" href="./css/navdrop.css">
</head>
<body>
    <div class="navbar"><!--div navbar-->
        <div class="navbar-logo"><!--nome e logo-->
            Escola Sesi Gumercindo de Góes - SR
        </div>
        <div class="user-name"><!--user-->
            <img src="./img/foto_aluna.jpg" alt="Foto do aluno SESI" class="user-photo">
            <div class="dropdown"><!--meu dropdown-->
                <span class="user-name">Nome do aluno</span>
                <div class="dropdown-content"><!--down-->
                    <a href="#">Meu perfil</a>
                    <a href="#">Configurações</a>
                    <a href="#">Relatório</a>
                    <a href="#">Sair</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
